name: Windows-12hr-RDP

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 720

    steps:
    - name: Enable RDP
  shell: pwsh
  run: |
    $username = "runneradmin"
    $password = "Password123!"
    
    # Create user only if it does not exist
    if (-not (Get-LocalUser -Name $username -ErrorAction SilentlyContinue)) {
      net user $username $password /add
    } else {
      Write-Host "User $username already exists, skipping creation."
    }
    
    # Add user to Remote Desktop Users group (if not already a member)
    $group = "Remote Desktop Users"
    $userObj = Get-LocalUser -Name $username
    $groupObj = Get-LocalGroup -Name $group
    $members = Get-LocalGroupMember -Group $group | Where-Object { $_.Name -eq "$env:COMPUTERNAME\$username" }
    if (-not $members) {
      Add-LocalGroupMember -Group $group -Member $userObj
    } else {
      Write-Host "User already in $group, skipping."
    }
    
    # Enable RDP if not already enabled
    $rdpKey = "HKLM:\System\CurrentControlSet\Control\Terminal Server"
    if ((Get-ItemProperty -Path $rdpKey -Name "fDenyTSConnections").fDenyTSConnections -ne 0) {
      Set-ItemProperty -Path $rdpKey -Name "fDenyTSConnections" -Value 0
      Write-Host "RDP enabled."
    } else {
      Write-Host "RDP already enabled."
    }
    
    # Ensure firewall rule is enabled
    Enable-NetFirewallRule -DisplayGroup "Remote Desktop" -ErrorAction SilentlyContinue

    - name: Download ngrok
      run: |
        Invoke-WebRequest https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-stable-windows-amd64.zip -OutFile ngrok.zip
        Expand-Archive ngrok.zip

    - name: Connect ngrok
      run: |
        .\ngrok.exe authtoken 39kYnDLPEZS2bMaQ4rUBXAC04eT_6qVcSGzy85cx5S2gPetxo
        .\ngrok.exe tcp 3389

    - name: Keep RDP Alive
      run: |
        while ($true) { Start-Sleep -Seconds 300 }
